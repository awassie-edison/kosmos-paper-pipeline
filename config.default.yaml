# Article-type filtering patterns
filtering:
  exclude_type_patterns:
  - \breview\b
  - \bperspective\b
  - \beditorial\b
  - \bcommentary\b
  - \bcorrespondence\b
  - \bletter to the editor\b
  - \berratum\b
  - \bcorrigendum\b
  - \bretraction\b
  exclude_tool_patterns:
  - \ba (?:tool|package|pipeline|framework|platform|software|database|resource) for\b
  - \bwe (?:present|introduce|develop|describe) (?:a |an )?(?:new |novel )?(?:tool|method|package|pipeline|software)\b
  excluded_pub_types:
  - comment
  - commentary
  - correspondence
  - corrigendum
  - editorial
  - erratum
  - letter
  - retracted publication
  - retraction
  - review
  - review-article

# Edison upload settings
upload:
  num_steps: 20
  run_tardigrade: false
  enable_literature_research: false
