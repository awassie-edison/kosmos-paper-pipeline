# Pipeline settings
pipeline:
  model: claude-opus-4-6
  max_candidates: 150
  max_papers: 20
  date_window_months: 6
  output_dir: null
  kosmos_opt_dir: null
  exclude_dois_file: null
  stage: DEV

# Scoring thresholds
thresholds:
  max_data_size_gb: 15.0
  max_datasets_per_paper: 5
  min_quality_score: 3.0
  min_domains: 4
  tier_2_penalty: 0.5

